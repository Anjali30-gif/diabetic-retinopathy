<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetinaSight AI | Diabetic Retinopathy Diagnostic Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .upload-section {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-section input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .analyze-btn {
            display: block;
            width: 100%;
            margin-top: 25px;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .analyze-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loader */
        #loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Result Section */
        #results {
            display: none;
            margin-top: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 30px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .vis-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .vis-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .vis-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vis-card span {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .desc-box {
            margin-top: 30px;
            padding: 20px;
            border-left: 4px solid var(--primary);
            background: rgba(59, 130, 246, 0.1);
            border-radius: 0 12px 12px 0;
        }

        .desc-box h4 {
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        .desc-box p {
            color: #94a3b8;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>RetinaSight AI</h1>
            <p>Advanced Neural Diagnostics for Diabetic Retinopathy</p>
        </header>

        <form id="upload-form">
            <div class="upload-section" id="drop-zone">
                <span class="upload-icon">👁️</span>
                <h3 id="file-label">Drop fundus image or click to browse</h3>
                <p style="color: #64748b; margin-top: 8px;">Supports JPG, PNG, TIFF</p>
                <input type="file" name="retinal_image" id="file-input" accept="image/*" required>
            </div>
            <button type="submit" class="analyze-btn" id="submit-btn">Begin AI Analysis</button>
        </form>

        <div id="loader"></div>

        <div id="results">
            <div class="result-header">
                <div>
                    <h2 id="prediction-label" style="font-size: 2rem; margin-bottom: 4px;">---</h2>
                    <p id="status-text" class="status-badge" style="display: inline-block;">---</p>
                </div>
                <div style="text-align: right;">
                    <span style="color: #94a3b8; font-size: 0.9rem; display: block; margin-bottom: 5px;">AI
                        Confidence</span>
                    <h3 id="confidence-score" style="font-size: 2rem; color: var(--primary);">0.0%</h3>
                </div>
            </div>

            <div class="vis-grid">
                <div class="vis-card">
                    <img id="original-preview" src="" alt="Original">
                    <span>Original Scan</span>
                </div>
                <div class="vis-card">
                    <img id="gradcam-preview" src="" alt="Grad-CAM">
                    <span>Grad-CAM (Attention)</span>
                </div>
                <div class="vis-card">
                    <img id="lime-preview" src="" alt="LIME">
                    <span>LIME (Features)</span>
                </div>
            </div>

            <div class="desc-box">
                <h4>Clinical Assessment</h4>
                <p id="description-text">AI is processing findings...</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const results = document.getElementById('results');
        const loader = document.getElementById('loader');
        const submitBtn = document.getElementById('submit-btn');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.innerText = `Selected: ${e.target.files[0].name}`;
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            loader.style.display = 'block';
            results.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Analyzing Retina...';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('prediction-label').innerText = data.label;
                    document.getElementById('prediction-label').style.color = data.color;

                    const statusBadge = document.getElementById('status-text');
                    statusBadge.innerText = data.status;
                    statusBadge.style.background = `${data.color}20`;
                    statusBadge.style.color = data.color;

                    document.getElementById('confidence-score').innerText = data.confidence;
                    document.getElementById('confidence-score').style.color = data.color;

                    document.getElementById('description-text').innerText = data.description;

                    document.getElementById('original-preview').src = data.original_url;
                    document.getElementById('gradcam-preview').src = data.gradcam_url;
                    document.getElementById('lime-preview').src = data.lime_url;

                    results.style.display = 'block';
                    results.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                alert('Analysis failed. Please ensure the model is trained.');
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Begin AI Analysis';
            }
        };
    </script>
</body>

</html>
